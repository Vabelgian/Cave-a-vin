<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article — Décryptage Œnologique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --creme: #F5F0E8;
    --creme-dark: #EAE3D5;
    --bordeaux: #6B1A2A;
    --bordeaux-light: #8B2A3E;
    --bordeaux-pale: #F0E5E8;
    --or: #B8964A;
    --or-light: #D4B06A;
    --encre: #1C1410;
    --gris-chaud: #7A736A;
    --gris-pale: #C8C0B4;
    --blanc: #FDFAF5;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background-color: var(--creme);
    color: var(--encre);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── NAV ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--blanc);
    border-bottom: 1px solid var(--creme-dark);
    padding: 0 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
  }
  .nav-logo {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--bordeaux);
    text-decoration: none;
  }
  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }
  .nav-links a {
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gris-chaud);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--bordeaux); }

  /* ── BREADCRUMB ── */
  .breadcrumb {
    max-width: 780px;
    margin: 0 auto;
    padding: 1.5rem 2rem 0;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.72rem;
    color: var(--gris-pale);
    letter-spacing: 0.05em;
  }
  .breadcrumb a {
    color: var(--gris-chaud);
    text-decoration: none;
    transition: color 0.2s;
  }
  .breadcrumb a:hover { color: var(--bordeaux); }
  .breadcrumb-sep { color: var(--gris-pale); }
  .breadcrumb-current { color: var(--gris-pale); }

  /* ── ARTICLE HEADER ── */
  .article-header {
    max-width: 780px;
    margin: 0 auto;
    padding: 2.5rem 2rem 0;
    text-align: center;
  }
  .article-cat-label {
    display: inline-block;
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--bordeaux);
    border: 1px solid var(--bordeaux);
    padding: 0.3rem 0.9rem;
    margin-bottom: 1.8rem;
  }
  .article-header h1 {
    font-family: var(--serif);
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 400;
    font-style: italic;
    line-height: 1.15;
    color: var(--encre);
    margin-bottom: 1.5rem;
    max-width: 680px;
    margin-left: auto;
    margin-right: auto;
  }
  .article-intro {
    font-family: var(--serif);
    font-size: 1.2rem;
    font-weight: 400;
    color: var(--gris-chaud);
    line-height: 1.7;
    max-width: 580px;
    margin: 0 auto 2rem;
  }
  .article-meta-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 1.2rem 0;
    border-top: 1px solid var(--creme-dark);
    border-bottom: 1px solid var(--creme-dark);
    margin-bottom: 0;
  }
  .meta-item {
    font-size: 0.72rem;
    color: var(--gris-pale);
    letter-spacing: 0.05em;
  }
  .meta-item strong {
    display: block;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gris-chaud);
    margin-bottom: 0.2rem;
  }

  /* ── HERO IMAGE ── */
  .article-hero-image {
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
    aspect-ratio: 21/9;
    overflow: hidden;
  }
  .article-hero-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.9);
  }

  /* ── ARTICLE BODY ── */
  .article-body {
    max-width: 680px;
    margin: 0 auto;
    padding: 3.5rem 2rem 5rem;
  }

  /* Blocs de contenu */
  .block-paragraphe {
    font-family: var(--serif);
    font-size: 1.15rem;
    font-weight: 400;
    line-height: 1.85;
    color: var(--encre);
    margin-bottom: 1.8rem;
  }

  .block-titre2 {
    font-family: var(--serif);
    font-size: 1.7rem;
    font-weight: 500;
    font-style: italic;
    color: var(--encre);
    margin: 3rem 0 1.2rem;
    line-height: 1.2;
  }

  .block-titre3 {
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--bordeaux);
    margin: 2.5rem 0 0.8rem;
  }

  .block-citation {
    border-left: 2px solid var(--or);
    margin: 2.5rem 0;
    padding: 0.5rem 0 0.5rem 2rem;
  }
  .block-citation p {
    font-family: var(--serif);
    font-size: 1.4rem;
    font-style: italic;
    font-weight: 300;
    color: var(--encre);
    line-height: 1.5;
    margin-bottom: 0.6rem;
  }
  .block-citation cite {
    font-size: 0.72rem;
    font-style: normal;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gris-pale);
  }

  .block-encadre {
    background: var(--blanc);
    border: 1px solid var(--creme-dark);
    border-top: 2px solid var(--bordeaux);
    padding: 1.5rem 1.8rem;
    margin: 2.5rem 0;
  }
  .block-encadre-titre {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--bordeaux);
    margin-bottom: 0.8rem;
  }
  .block-encadre p {
    font-size: 0.9rem;
    color: var(--gris-chaud);
    line-height: 1.7;
  }

  .block-separateur {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin: 3rem 0;
    color: var(--or);
    font-size: 1.2rem;
    letter-spacing: 0.4em;
  }
  .block-separateur::before,
  .block-separateur::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--creme-dark);
  }

  /* ── TAGS ── */
  .article-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin: 3rem 0 0;
    padding-top: 2rem;
    border-top: 1px solid var(--creme-dark);
  }
  .tag {
    font-size: 0.68rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--gris-chaud);
    background: var(--blanc);
    border: 1px solid var(--creme-dark);
    padding: 0.3rem 0.8rem;
  }

  /* ── NAVIGATION ARTICLES ── */
  .articles-nav {
    background: var(--blanc);
    border-top: 1px solid var(--creme-dark);
    padding: 3rem 2rem;
  }
  .articles-nav-inner {
    max-width: 1000px;
    margin: 0 auto;
  }
  .articles-nav-label {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--or);
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 2rem;
  }
  .articles-nav-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--or);
    opacity: 0.3;
  }
  .articles-nav-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
  }
  .nav-card {
    cursor: pointer;
    text-decoration: none;
    display: block;
    background: var(--creme);
    border: 1px solid var(--creme-dark);
    overflow: hidden;
    transition: box-shadow 0.25s;
  }
  .nav-card:hover { box-shadow: 0 4px 20px rgba(107,26,42,0.1); }
  .nav-card-image {
    aspect-ratio: 3/2;
    overflow: hidden;
  }
  .nav-card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s;
    filter: saturate(0.85);
  }
  .nav-card:hover .nav-card-image img { transform: scale(1.04); filter: saturate(1); }
  .nav-card-body {
    padding: 1rem 1.1rem 1.2rem;
  }
  .nav-card-cat {
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--bordeaux);
    margin-bottom: 0.4rem;
  }
  .nav-card-title {
    font-family: var(--serif);
    font-size: 1rem;
    font-style: italic;
    font-weight: 500;
    color: var(--encre);
    line-height: 1.3;
  }

  /* ── BACK BUTTON ── */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gris-chaud);
    text-decoration: none;
    transition: color 0.2s;
    margin-bottom: 2rem;
  }
  .back-btn:hover { color: var(--bordeaux); }
  .back-btn svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
  }

  /* ── FOOTER ── */
  .page-footer {
    border-top: 1px solid var(--creme-dark);
    padding: 2.5rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--blanc);
  }
  .footer-brand {
    font-family: var(--serif);
    font-size: 0.95rem;
    font-style: italic;
    color: var(--gris-chaud);
  }
  .footer-brand span { color: var(--bordeaux); }
  .footer-note { font-size: 0.72rem; color: var(--gris-pale); }

  /* ── PAGE 404 ── */
  .not-found {
    max-width: 500px;
    margin: 8rem auto;
    text-align: center;
    padding: 0 2rem;
  }
  .not-found h1 {
    font-family: var(--serif);
    font-size: 2rem;
    font-style: italic;
    margin-bottom: 1rem;
  }
  .not-found p {
    color: var(--gris-chaud);
    margin-bottom: 2rem;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    nav { padding: 0 1.5rem; }
    .nav-links { display: none; }
    .article-hero-image { aspect-ratio: 16/9; }
    .articles-nav-grid { grid-template-columns: 1fr; gap: 1rem; }
    .page-footer { flex-direction: column; gap: 0.5rem; text-align: center; }
  }
  @media (min-width: 901px) and (max-width: 1100px) {
    .articles-nav-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">La Cave & l'Esprit</a>
  <ul class="nav-links">
    <li><a href="#">Cépages</a></li>
    <li><a href="#">Régions</a></li>
    <li><a href="#">Vinification</a></li>
    <li><a href="#">Sélections</a></li>
    <li><a href="#">À propos</a></li>
  </ul>
</nav>

<!-- CONTENU DYNAMIQUE -->
<div id="pageContent"></div>

<!-- FOOTER -->
<footer class="page-footer">
  <p class="footer-brand">La Cave & l'Esprit — <span>Décryptage œnologique</span></p>
  <p class="footer-note">Tous droits réservés · Contenu éditorial</p>
</footer>

<script src="data/articles.js"></script>
<script>
  const ARROW_SVG  = `<svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/></svg>`;
  const ARROW_LEFT = `<svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 12H5M12 19l-7-7 7-7"/></svg>`;

  // ── RÉCUPÉRER L'ID DANS L'URL ─────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const articleId = params.get('id');
  const article = articleId ? getArticleById(articleId) : null;

  // ── RENDU D'UN BLOC DE CONTENU ────────────────────────────────────────────
  function renderBloc(bloc) {
    switch (bloc.type) {
      case 'paragraphe':
        return `<p class="block-paragraphe">${bloc.texte}</p>`;

      case 'titre2':
        return `<h2 class="block-titre2">${bloc.texte}</h2>`;

      case 'titre3':
        return `<h3 class="block-titre3">${bloc.texte}</h3>`;

      case 'citation':
        return `
          <blockquote class="block-citation">
            <p>${bloc.texte}</p>
            ${bloc.source ? `<cite>${bloc.source}</cite>` : ''}
          </blockquote>`;

      case 'encadre':
        return `
          <div class="block-encadre">
            ${bloc.titre ? `<p class="block-encadre-titre">${bloc.titre}</p>` : ''}
            <p>${bloc.texte}</p>
          </div>`;

      case 'separateur':
        return `<div class="block-separateur">✦ ✦ ✦</div>`;

      default:
        return '';
    }
  }

  // ── ARTICLES SUGGÉRÉS ─────────────────────────────────────────────────────
  function renderSuggestions(currentId) {
    const pool = ARTICLES.filter(a => a.id !== currentId);
    // Mélange et prend 3
    const suggestions = pool.sort(() => Math.random() - 0.5).slice(0, 3);
    return suggestions.map(a => `
      <a class="nav-card" href="article.html?id=${a.id}">
        <div class="nav-card-image">
          <img src="${a.image}" alt="${a.imageAlt}" loading="lazy">
        </div>
        <div class="nav-card-body">
          <p class="nav-card-cat">${a.categorieLabel}</p>
          <p class="nav-card-title">${a.titre}</p>
        </div>
      </a>`).join('');
  }

  // ── PAGE ARTICLE ──────────────────────────────────────────────────────────
  function renderArticle(a) {
    document.title = `${a.titre} — Décryptage Œnologique`;

    const contenuHTML = a.contenu.map(renderBloc).join('');
    const tagsHTML = a.tags.map(t => `<span class="tag">${t}</span>`).join('');

    document.getElementById('pageContent').innerHTML = `
      <div class="breadcrumb">
        <a href="decryptage-oenologique.html">Décryptage œnologique</a>
        <span class="breadcrumb-sep">›</span>
        <a href="decryptage-oenologique.html">${a.categorieLabel}</a>
        <span class="breadcrumb-sep">›</span>
        <span class="breadcrumb-current">${a.titre.substring(0, 40)}…</span>
      </div>

      <header class="article-header">
        <span class="article-cat-label">${a.categorieLabel}</span>
        <h1>${a.titre}</h1>
        <p class="article-intro">${a.intro}</p>
        <div class="article-meta-bar">
          <div class="meta-item">
            <strong>Publié le</strong>${formatDate(a.date)}
          </div>
          <div class="meta-item">
            <strong>Lecture</strong>${a.lecture} min
          </div>
          <div class="meta-item">
            <strong>Thème</strong>${a.categorieLabel}
          </div>
        </div>
      </header>

      <div class="article-hero-image">
        <img src="${a.image}" alt="${a.imageAlt}">
      </div>

      <main class="article-body">
        ${contenuHTML}
        <div class="article-tags">${tagsHTML}</div>
        <a href="decryptage-oenologique.html" class="back-btn" style="margin-top:2.5rem;">
          ${ARROW_LEFT} Retour aux articles
        </a>
      </main>

      <section class="articles-nav">
        <div class="articles-nav-inner">
          <div class="articles-nav-label">À lire aussi</div>
          <div class="articles-nav-grid">
            ${renderSuggestions(a.id)}
          </div>
        </div>
      </section>`;
  }

  // ── PAGE 404 ──────────────────────────────────────────────────────────────
  function renderNotFound() {
    document.title = 'Article introuvable — Décryptage Œnologique';
    document.getElementById('pageContent').innerHTML = `
      <div class="not-found">
        <h1>Article introuvable</h1>
        <p>Cet article n'existe pas ou a été déplacé.</p>
        <a href="decryptage-oenologique.html" class="back-btn">
          ${ARROW_LEFT} Retour aux articles
        </a>
      </div>`;
  }

  // ── INIT ──────────────────────────────────────────────────────────────────
  article ? renderArticle(article) : renderNotFound();
</script>

</body>
</html>
