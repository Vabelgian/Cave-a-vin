<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Cave</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#d4af37" />
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f4f1ec;
      padding: 20px;
    }

    /* ── Barre de filtres ── */
    .filtres {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
      align-items: center;
    }

    .filtres input[type="text"] {
      flex: 1;
      min-width: 180px;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      background: white;
    }

    .filtres select {
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      background: white;
      cursor: pointer;
    }

    .btn-ajouter {
      background: #5a1f1f;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      white-space: nowrap;
    }
    .btn-ajouter:hover { opacity: 0.9; }

    .compteur {
      font-size: 13px;
      color: #666;
      width: 100%;
    }

    /* ── Carte vin ── */
    .vin {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .entete-vin {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .zone-photo {
      flex-shrink: 0;
    }

    .photo-bouteille {
      width: 120px;
      max-height: 220px;
      object-fit: contain;
      border-radius: 8px;
      background: #f4f1ec;
      padding: 8px;
    }

    .photo-manquante {
      width: 120px;
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-radius: 8px;
      background: #f4f1ec;
      color: #7a6f63;
      font-size: 13px;
      padding: 10px;
    }

    .infos-vin { flex: 1; }

    .tags-vin {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .tag {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    .tag-rouge  { background: #f5e0e0; color: #7a1f1f; }
    .tag-blanc  { background: #fdf6dc; color: #7a6000; }
    .tag-rose   { background: #fde8f0; color: #9b2655; }
    .tag-pays   { background: #e8f0fe; color: #1a4fa0; }
    .tag-cepage { background: #e8f5e9; color: #1b5e20; }
    .tag-stock  { background: #f3e5f5; color: #6a1b9a; }

    h2 { color: #5a1f1f; font-size: 17px; margin-bottom: 6px; }
    h3 { color: #333; font-size: 14px; margin: 10px 0 4px; }
    p  { font-size: 14px; color: #444; line-height: 1.5; margin-bottom: 4px; }

    summary {
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
      color: #333;
      font-size: 14px;
      padding: 4px 0;
    }
    details { margin-top: 6px; }
    details p { margin-top: 4px; }

    /* ── Modal ajout ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      overflow-y: auto;
      padding: 20px;
    }
    .modal-overlay.actif { display: flex; align-items: flex-start; justify-content: center; }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 520px;
      margin: auto;
    }

    .modal h2 { color: #5a1f1f; margin-bottom: 16px; }

    .modal label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #444;
      margin: 10px 0 4px;
    }

    .modal input,
    .modal select,
    .modal textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      font-family: Arial, sans-serif;
    }

    .modal textarea { resize: vertical; min-height: 60px; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: flex-end;
    }

    .btn-annuler {
      background: #eee;
      color: #333;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-sauver {
      background: #5a1f1f;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .chargement {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 16px;
    }

    @media (max-width: 600px) {
      .entete-vin { flex-direction: column; }
      .photo-bouteille, .photo-manquante { width: 100%; max-width: 180px; }
    }
  </style>
</head>
<body>

  <!-- Filtres -->
  <div class="filtres">
    <input type="text" id="recherche" placeholder="🔍 Rechercher un vin..." oninput="filtrer()">
    <select id="filtre-couleur" onchange="filtrer()">
      <option value="">Toutes les couleurs</option>
      <option value="rouge">Rouge</option>
      <option value="blanc">Blanc</option>
      <option value="rose">Rosé</option>
    </select>
    <select id="filtre-pays" onchange="filtrer()">
      <option value="">Tous les pays</option>
    </select>
    <button class="btn-ajouter" onclick="ouvrirModal()">+ Ajouter un vin</button>
    <div class="compteur" id="compteur"></div>
  </div>

  <!-- Liste des vins -->
  <div id="cave">
    <div class="chargement">Chargement de la cave...</div>
  </div>

  <!-- Modal ajout -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>🍷 Ajouter un vin</h2>

      <label>Nom du vin *</label>
      <input type="text" id="f-nom" placeholder="Ex : Château Margaux 2018">

      <label>Couleur *</label>
      <select id="f-couleur">
        <option value="rouge">Rouge</option>
        <option value="blanc">Blanc</option>
        <option value="rose">Rosé</option>
      </select>

      <label>Pays</label>
      <input type="text" id="f-pays" placeholder="Ex : France">

      <label>Région</label>
      <input type="text" id="f-region" placeholder="Ex : Bordeaux">

      <label>Cépage</label>
      <input type="text" id="f-cepage" placeholder="Ex : Merlot, Cabernet Sauvignon">

      <label>Style</label>
      <input type="text" id="f-style" placeholder="Ex : Élégant, tannique">

      <label>Stock (nb de bouteilles)</label>
      <input type="number" id="f-stock" value="1" min="1">

      <label>Profil / Description</label>
      <textarea id="f-profil" placeholder="Description du vin..."></textarea>

      <label>Nom du fichier photo (dans /images/)</label>
      <input type="text" id="f-photo" placeholder="Ex : monvin.jpg">

      <label>Garde</label>
      <input type="text" id="f-garde" placeholder="Ex : 5–10 ans">

      <label>Carafage</label>
      <input type="text" id="f-carafage" placeholder="Ex : 1h minimum">

      <label>Température de service</label>
      <input type="text" id="f-temp" placeholder="Ex : 16–18°C">

      <label>Accords mets</label>
      <textarea id="f-accords" placeholder="Ex : Viandes rouges, fromages..."></textarea>

      <div class="modal-actions">
        <button class="btn-annuler" onclick="fermerModal()">Annuler</button>
        <button class="btn-sauver" onclick="sauverVin()">Ajouter</button>
      </div>
    </div>
  </div>

<script>
  let tousLesVins = [];

  // ── Chargement du JSON ──
  fetch('vins.json')
    .then(r => r.json())
    .then(data => {
      tousLesVins = data;
      peuplerFiltrePays();
      afficher(tousLesVins);
    })
    .catch(() => {
      document.getElementById('cave').innerHTML =
        '<div class="chargement">⚠️ Impossible de charger vins.json</div>';
    });

  // ── Peupler le filtre pays ──
  function peuplerFiltrePays() {
    const pays = [...new Set(tousLesVins.map(v => v.pays).filter(Boolean))].sort();
    const sel = document.getElementById('filtre-pays');
    pays.forEach(p => {
      const o = document.createElement('option');
      o.value = p; o.textContent = p;
      sel.appendChild(o);
    });
  }

  // ── Filtrage ──
  function filtrer() {
    const q      = document.getElementById('recherche').value.toLowerCase();
    const couleur = document.getElementById('filtre-couleur').value;
    const pays   = document.getElementById('filtre-pays').value;

    const resultats = tousLesVins.filter(v => {
      const texte = (v.nom + v.region + v.cepage + v.style + v.profil).toLowerCase();
      return (!q      || texte.includes(q))
          && (!couleur || v.couleur === couleur)
          && (!pays   || v.pays === pays);
    });

    afficher(resultats);
  }

  // ── Rendu HTML d'un vin ──
  function afficher(liste) {
    const cave = document.getElementById('cave');
    document.getElementById('compteur').textContent =
      liste.length + ' vin' + (liste.length > 1 ? 's' : '') + ' · ' +
      liste.reduce((s, v) => s + (v.stock || 0), 0) + ' bouteilles';

    if (liste.length === 0) {
      cave.innerHTML = '<div class="chargement">Aucun vin trouvé.</div>';
      return;
    }

    cave.innerHTML = liste.map(v => {
      const tag = v.couleur === 'rouge' ? 'tag-rouge' : v.couleur === 'blanc' ? 'tag-blanc' : 'tag-rose';
      const label = v.couleur.charAt(0).toUpperCase() + v.couleur.slice(1);

      const photoHtml = v.photo
        ? `<img src="${v.photo}" alt="${v.nom}" class="photo-bouteille"
             onerror="this.outerHTML='<div class=\\'photo-manquante\\'>Photo à ajouter</div>'">`
        : `<div class="photo-manquante">Photo à ajouter</div>`;

      const j = v.journal || {};
      const t = v.technique || {};
      const d = v.degustation || {};
      const ne = v.notes_experts || {};

      const journalRempli = j.date || j.occasion || j.ressenti || j.note_personnelle;

      return `
        <div class="vin">
          <div class="entete-vin">
            <div class="zone-photo">${photoHtml}</div>
            <div class="infos-vin">
              <div class="tags-vin">
                <span class="tag ${tag}">${label}</span>
                <span class="tag tag-pays">${v.pays || ''}${v.region ? ' – ' + v.region : ''}</span>
                ${v.cepage ? `<span class="tag tag-cepage">${v.cepage}</span>` : ''}
                ${v.stock ? `<span class="tag tag-stock">📦 ${v.stock} bouteille${v.stock > 1 ? 's' : ''}</span>` : ''}
              </div>
              <h2>${v.nom}</h2>
              <h3>1. Identité</h3>
              <p><strong>Pays / région :</strong> ${v.pays || ''}${v.region ? ' – ' + v.region : ''}</p>
              <p><strong>Cépage :</strong> ${v.cepage || '—'}</p>
              <p><strong>Style :</strong> ${v.style || '—'}</p>
              <h3>2. Profil</h3>
              <p>${v.profil || '—'}</p>
              <p><strong>Notes experts :</strong>
                ${ne.wine_advocate || 'N/a'} Wine Advocate –
                ${ne.jancis_robinson || 'N/a'} Jancis Robinson –
                ${ne.james_suckling || 'N/a'} James Suckling –
                ${ne.peak_wines || 'N/a'} Peak Wines
              </p>
            </div>
          </div>

          <details>
            <summary>3. Dégustation</summary>
            <p><strong>Couleur :</strong> ${d.couleur || '—'}</p>
            <p><strong>Nez :</strong> ${d.nez || '—'}</p>
            <p><strong>Bouche :</strong> ${d.bouche || '—'}</p>
          </details>

          <details>
            <summary>4. Infos techniques</summary>
            <p><strong>Vinification :</strong> ${t.vinification || '—'}</p>
            <p><strong>Classification :</strong> ${t.classification || '—'}</p>
            <p><strong>Garde :</strong> ${t.garde || '—'}</p>
            <p><strong>Carafage :</strong> ${t.carafage || '—'}</p>
            <p><strong>Température :</strong> ${t.temperature || '—'}</p>
            <p><strong>Accords mets :</strong> ${t.accords || '—'}</p>
          </details>

          <details ${journalRempli ? 'open' : ''}>
            <summary>5. Journal personnel${journalRempli ? ' ✍️' : ''}</summary>
            <p><strong>Date de dégustation :</strong> ${j.date || '(à compléter)'}</p>
            <p><strong>Occasion :</strong> ${j.occasion || '(à compléter)'}</p>
            <p><strong>Avec quoi :</strong> ${j.avec_quoi || '(à compléter)'}</p>
            <p><strong>Ressenti global :</strong> ${j.ressenti || '(à compléter)'}</p>
            <p><strong>Évolution dans le verre :</strong> ${j.evolution_verre || '(à compléter)'}</p>
            <p><strong>Note personnelle :</strong> ${j.note_personnelle || '(à compléter)'}</p>
          </details>
        </div>`;
    }).join('');
  }

  // ── Modal ──
  function ouvrirModal() {
    document.getElementById('modal').classList.add('actif');
  }

  function fermerModal() {
    document.getElementById('modal').classList.remove('actif');
  }

  function sauverVin() {
    const nom = document.getElementById('f-nom').value.trim();
    if (!nom) { alert('Le nom du vin est obligatoire.'); return; }

    const nouveau = {
      id: tousLesVins.length + 1,
      nom,
      couleur:  document.getElementById('f-couleur').value,
      pays:     document.getElementById('f-pays').value.trim(),
      region:   document.getElementById('f-region').value.trim(),
      cepage:   document.getElementById('f-cepage').value.trim(),
      style:    document.getElementById('f-style').value.trim(),
      stock:    parseInt(document.getElementById('f-stock').value) || 1,
      profil:   document.getElementById('f-profil').value.trim(),
      photo:    document.getElementById('f-photo').value.trim()
                  ? 'images/' + document.getElementById('f-photo').value.trim()
                  : '',
      notes_experts: { wine_advocate: 'N/a', jancis_robinson: 'N/a', james_suckling: 'N/a', peak_wines: 'N/a' },
      degustation: { couleur: '', nez: '', bouche: '' },
      technique: {
        vinification: '',
        classification: '',
        garde:    document.getElementById('f-garde').value.trim(),
        carafage: document.getElementById('f-carafage').value.trim(),
        temperature: document.getElementById('f-temp').value.trim(),
        accords:  document.getElementById('f-accords').value.trim()
      },
      journal: { date: '', occasion: '', avec_quoi: '', ressenti: '', evolution_verre: '', note_personnelle: '' }
    };

    tousLesVins.push(nouveau);
    fermerModal();
    filtrer();

    // Générer le JSON à copier dans GitHub
    const blob = new Blob([JSON.stringify(tousLesVins, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'vins.json'; a.click();
    URL.revokeObjectURL(url);

    alert('✅ Vin ajouté !\n\nUn fichier vins.json a été téléchargé.\nRemplace-le dans ton repo GitHub pour sauvegarder définitivement.');
  }

  // Fermer modal en cliquant à l'extérieur
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) fermerModal();
  });
</script>
</body>
</html>
