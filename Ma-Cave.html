<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ma Cave à Vin — Vinea</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap');

  :root {
    --bordeaux: #5a1f1f;
    --bordeaux-light: #7a2f2f;
    --bordeaux-dark: #3d1515;
    --creme: #f4f1ec;
    --creme-dark: #e8e3da;
    --or: #c9a96e;
    --or-light: #e0c898;
    --texte: #2a1a1a;
    --texte-light: #6b5050;
    --blanc: #ffffff;
    /* safe area pour notch/home bar */
    --sab: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--creme);
    color: var(--texte);
    min-height: 100vh;
    /* évite le rebond iOS */
    overscroll-behavior: none;
  }

  /* ─── HEADER ─── */
  .header {
    background: var(--bordeaux-dark);
    padding: 32px 40px 24px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 220px; height: 220px;
    border: 1px solid rgba(201,169,110,0.15);
    border-radius: 50%;
    pointer-events: none;
  }
  .header::after {
    content: '';
    position: absolute;
    top: -70px; right: -70px;
    width: 300px; height: 300px;
    border: 1px solid rgba(201,169,110,0.08);
    border-radius: 50%;
    pointer-events: none;
  }
  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(1.7rem, 5vw, 3rem);
    color: var(--creme);
    letter-spacing: 0.04em;
  }
  .header h1 span { color: var(--or); font-style: italic; }
  .header-subtitle {
    color: rgba(244,241,236,0.5);
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .compteur {
    background: rgba(201,169,110,0.15);
    border: 1px solid rgba(201,169,110,0.3);
    color: var(--or-light);
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.06em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ─── CONTROLS ─── */
  .controls {
    background: var(--bordeaux);
    padding: 14px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(61,21,21,0.3);
  }
  .controls-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 0;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(244,241,236,0.4);
    pointer-events: none;
    flex-shrink: 0;
  }
  #recherche {
    width: 100%;
    background: rgba(244,241,236,0.1);
    border: 1px solid rgba(244,241,236,0.2);
    border-radius: 8px;
    padding: 10px 12px 10px 36px;
    color: var(--creme);
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    /* évite le zoom iOS sur focus */
    font-size: 16px;
  }
  #recherche::placeholder { color: rgba(244,241,236,0.35); font-size: 14px; }
  #recherche:focus {
    border-color: var(--or);
    background: rgba(244,241,236,0.15);
  }
  .sep { width: 1px; height: 26px; background: rgba(244,241,236,0.2); flex-shrink: 0; }

  #btn-filtrer {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(244,241,236,0.1);
    border: 1px solid rgba(244,241,236,0.25);
    color: rgba(244,241,236,0.85);
    padding: 9px 16px;
    border-radius: 8px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.04em;
    /* taille min pour tap mobile */
    min-height: 44px;
    flex-shrink: 0;
  }
  #btn-filtrer:hover, #btn-filtrer:active {
    background: rgba(244,241,236,0.18);
    border-color: var(--or);
    color: var(--or-light);
  }
  #btn-filtrer.has-filtres {
    border-color: var(--or);
    color: var(--or-light);
    background: rgba(201,169,110,0.15);
  }
  .filtre-badge {
    display: none;
    background: var(--or);
    color: var(--bordeaux-dark);
    font-size: 10px;
    font-weight: 700;
    width: 17px; height: 17px;
    border-radius: 50%;
    align-items: center;
    justify-content: center;
  }
  .filtre-badge.visible { display: flex; }

  /* ─── DRAWER MOBILE (bottom sheet) ─── */
  .drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,10,10,0.5);
    z-index: 300;
    /* ferme le drawer au tap en dehors */
  }
  .drawer-overlay.open { display: block; }

  .drawer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 400;
    background: var(--blanc);
    border-radius: 22px 22px 0 0;
    /* hauteur max pour ne pas dépasser 90vh */
    max-height: 90dvh;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
    /* safe area iPhone */
    padding-bottom: calc(16px + var(--sab));
    box-shadow: 0 -8px 40px rgba(61,21,21,0.22);
  }
  .drawer.open { transform: translateY(0); }

  /* poignée de drag */
  .drawer-handle {
    width: 40px;
    height: 4px;
    background: var(--creme-dark);
    border-radius: 2px;
    margin: 12px auto 0;
    flex-shrink: 0;
  }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--creme-dark);
  }
  .drawer-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 1.2rem;
    color: var(--bordeaux-dark);
    letter-spacing: 0.04em;
  }
  .drawer-close {
    background: var(--creme);
    border: none;
    color: var(--texte-light);
    cursor: pointer;
    font-size: 18px;
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .drawer-close:hover { background: var(--creme-dark); }

  /* zone scrollable */
  .drawer-body {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    flex: 1;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .drawer-section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--texte-light);
    margin-bottom: 8px;
  }

  /* Chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }
  .chip {
    background: var(--creme);
    border: 1.5px solid var(--creme-dark);
    color: var(--texte-light);
    padding: 7px 14px;
    border-radius: 20px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.03em;
    /* taille min pour tap */
    min-height: 36px;
    display: flex;
    align-items: center;
  }
  .chip:hover { border-color: var(--bordeaux); color: var(--bordeaux); }
  .chip.actif {
    background: var(--bordeaux);
    border-color: var(--bordeaux);
    color: var(--creme);
    font-weight: 500;
  }

  .drawer-sep {
    border: none;
    border-top: 1px solid var(--creme-dark);
    margin: 0;
  }

  .drawer-footer {
    padding: 12px 20px 0;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    border-top: 1px solid var(--creme-dark);
  }
  .btn-drawer-reset {
    flex: 1;
    background: none;
    border: 1.5px solid var(--creme-dark);
    color: var(--texte-light);
    padding: 12px 16px;
    border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 48px;
  }
  .btn-drawer-reset:hover { border-color: var(--bordeaux); color: var(--bordeaux); }
  .btn-drawer-appliquer {
    flex: 2;
    background: var(--bordeaux);
    border: 1.5px solid var(--bordeaux);
    color: var(--creme);
    padding: 12px 16px;
    border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    min-height: 48px;
  }
  .btn-drawer-appliquer:hover { background: var(--bordeaux-light); }

  /* ─── MAIN ─── */
  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  #aucun-resultat {
    display: none;
    text-align: center;
    padding: 80px 20px;
    color: var(--texte-light);
  }
  #aucun-resultat .emoji { font-size: 36px; margin-bottom: 14px; }
  #aucun-resultat p { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 300; }

  /* ─── CARTE VIN ─── */
  .vin {
    background: var(--blanc);
    margin-bottom: 16px;
    border-radius: 16px;
    box-shadow: 0 2px 10px rgba(90,31,31,0.07);
    overflow: hidden;
    transition: box-shadow 0.25s, transform 0.25s;
    animation: fadeIn 0.35s ease both;
  }
  .vin:hover { box-shadow: 0 5px 22px rgba(90,31,31,0.12); transform: translateY(-1px); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .vin.masque { display: none !important; }

  .entete-vin {
    display: flex;
    gap: 0;
    align-items: stretch;
  }

  .zone-photo {
    width: 110px;
    min-width: 110px;
    background: var(--creme);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 12px;
    border-right: 1px solid var(--creme-dark);
  }
  .photo-bouteille {
    width: 100%;
    max-height: 200px;
    object-fit: contain;
  }
  .photo-a-ajouter {
    width: 100%;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--texte-light);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  .infos-vin {
    flex: 1;
    padding: 14px 16px 12px;
    min-width: 0;
  }

  .tags-vin {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .tag {
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .tag-rouge  { background: #fbeaea; color: #8b2020; border: 1px solid #f0c5c5; }
  .tag-blanc  { background: #fdf9ee; color: #7a6020; border: 1px solid #e8d88a; }
  .tag-rose   { background: #fdeef4; color: #8b2050; border: 1px solid #f0c5d8; }
  .tag-pays   { background: var(--creme-dark); color: var(--texte-light); border: 1px solid #d8d0c5; }
  .tag-cepage { background: #eef4f0; color: #2a6040; border: 1px solid #c0d8c8; }
  .tag-cave   { background: #eef4f0; color: #2a6040; border: 1px solid #c0d8c8; }
  .tag-bu     { background: #f0f0f0; color: #888; border: 1px solid #ddd; }

  .badge-stock {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--creme-dark);
    border: 1px solid #d8d0c5;
    color: var(--texte-light);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .badge-stock.stock-zero { background: #fbeaea; border-color: #f0c5c5; color: #8b2020; }

  .infos-vin h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 1.05rem;
    color: var(--bordeaux-dark);
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .infos-vin h3 {
    font-family: 'Jost', sans-serif;
    font-weight: 500;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--or);
    margin: 10px 0 4px;
  }
  .infos-vin p { font-size: 13px; font-weight: 300; line-height: 1.6; color: #3a2a2a; margin-bottom: 3px; }
  .infos-vin p strong { font-weight: 500; color: var(--texte); }

  /* ─── ACCORDION ─── */
  details { border-top: 1px solid var(--creme-dark); }
  summary {
    cursor: pointer;
    padding: 12px 16px;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--bordeaux);
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.15s;
    user-select: none;
    min-height: 44px;
  }
  summary::-webkit-details-marker { display: none; }
  summary::after { content: '+'; font-size: 16px; font-weight: 300; color: var(--or); }
  details[open] summary::after { content: '−'; }
  summary:hover { background: var(--creme); }
  details > *:not(summary) { padding: 4px 16px 16px; }
  details p { font-size: 13px; font-weight: 300; line-height: 1.65; color: #3a2a2a; margin-bottom: 3px; }
  details p strong { font-weight: 500; }

  /* ─── DESKTOP ─── */
  @media (min-width: 700px) {
    .header { padding: 36px 40px 28px; }
    .controls { padding: 16px 40px; }
    .main { padding: 28px 40px 60px; }
    .zone-photo { width: 180px; min-width: 180px; padding: 20px 16px; }
    .photo-bouteille { max-height: 260px; }
    .infos-vin { padding: 20px 24px 16px; }
    .infos-vin h2 { font-size: 1.2rem; }
    .infos-vin p { font-size: 14px; }
    details > *:not(summary) { padding: 4px 24px 18px; }
    summary { padding: 13px 24px; font-size: 13px; }
    details p { font-size: 14px; }
    .vin { margin-bottom: 20px; }

    /* Sur desktop : modale classique au lieu du drawer */
    .drawer {
      position: fixed;
      top: 50%;
      left: 50%;
      right: auto;
      bottom: auto;
      transform: translate(-50%, -60%) scale(0.96);
      width: 100%;
      max-width: 520px;
      max-height: 80vh;
      border-radius: 20px;
      padding-bottom: 0;
      transition: opacity 0.2s, transform 0.2s;
      opacity: 0;
      pointer-events: none;
    }
    .drawer.open {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: auto;
    }
    .drawer-handle { display: none; }
    .drawer-footer { padding: 14px 24px 20px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div>
      <h1>Ma <span>Cave</span> à Vin</h1>
      <p class="header-subtitle">Collection personnelle · Vinea</p>
    </div>
    <div class="compteur" id="compteur">— bouteilles</div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="recherche" placeholder="Rechercher…" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="sep"></div>
    <button id="btn-filtrer" aria-label="Filtrer et trier">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
      </svg>
      Filtrer
      <span class="filtre-badge" id="filtre-badge">0</span>
    </button>
  </div>
</div>

<!-- OVERLAY -->
<div class="drawer-overlay" id="drawer-overlay"></div>

<!-- DRAWER / MODALE -->
<div class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Filtrer et trier">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <h2>Filtrer &amp; Trier</h2>
    <button class="drawer-close" id="drawer-close" aria-label="Fermer">✕</button>
  </div>

  <div class="drawer-body">

    <div>
      <div class="drawer-section-label">Couleur</div>
      <div class="chips">
        <button class="chip actif" data-filtre="couleur" data-valeur="tous">Tous</button>
        <button class="chip" data-filtre="couleur" data-valeur="rouge">🔴 Rouge</button>
        <button class="chip" data-filtre="couleur" data-valeur="blanc">🟡 Blanc</button>
        <button class="chip" data-filtre="couleur" data-valeur="rose">🌸 Rosé</button>
      </div>
    </div>

    <hr class="drawer-sep">

    <div>
      <div class="drawer-section-label">Pays</div>
      <div class="chips">
        <button class="chip actif" data-filtre="pays" data-valeur="tous">Tous</button>
        <button class="chip" data-filtre="pays" data-valeur="Italie">🇮🇹 Italie</button>
        <button class="chip" data-filtre="pays" data-valeur="France">🇫🇷 France</button>
        <button class="chip" data-filtre="pays" data-valeur="Espagne">🇪🇸 Espagne</button>
        <button class="chip" data-filtre="pays" data-valeur="Afrique du Sud">🇿🇦 Afrique du Sud</button>
        <button class="chip" data-filtre="pays" data-valeur="Portugal">🇵🇹 Portugal</button>
      </div>
    </div>

    <hr class="drawer-sep">

    <div>
      <div class="drawer-section-label">Cépage</div>
      <div class="chips" id="chips-cepage">
        <button class="chip actif" data-filtre="cepage" data-valeur="tous">Tous</button>
      </div>
    </div>

    <hr class="drawer-sep">

    <div>
      <div class="drawer-section-label">Statut</div>
      <div class="chips">
        <button class="chip actif" data-filtre="statut" data-valeur="tous">Tous</button>
        <button class="chip" data-filtre="statut" data-valeur="cave">🏠 En cave</button>
        <button class="chip" data-filtre="statut" data-valeur="bu">✓ Bu</button>
      </div>
    </div>

    <hr class="drawer-sep">

    <div>
      <div class="drawer-section-label">Trier par</div>
      <div class="chips">
        <button class="chip actif" data-filtre="tri" data-valeur="defaut">Par défaut</button>
        <button class="chip" data-filtre="tri" data-valeur="alpha-asc">A → Z</button>
        <button class="chip" data-filtre="tri" data-valeur="alpha-desc">Z → A</button>
        <button class="chip" data-filtre="tri" data-valeur="pays">Par pays</button>
        <button class="chip" data-filtre="tri" data-valeur="cepage">Par cépage</button>
      </div>
    </div>

  </div><!-- drawer-body -->

  <div class="drawer-footer">
    <button class="btn-drawer-reset" id="btn-drawer-reset">Réinitialiser</button>
    <button class="btn-drawer-appliquer" id="btn-drawer-appliquer">Appliquer</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div id="cave">

  </div><!-- #cave -->

  <div id="aucun-resultat">
    <div class="emoji">🍷</div>
    <p>Aucun vin ne correspond à votre recherche.</p>
  </div>
</div><!-- .main -->

<script>
  // ─── ÉTAT ───────────────────────────────────────────────
  let filtreActif = { couleur: 'tous', pays: 'tous', cepage: 'tous', statut: 'tous', tri: 'defaut' };
  const cave = document.getElementById('cave');
  let ordreOriginal = [];

  // ─── DRAWER ─────────────────────────────────────────────
  const overlay  = document.getElementById('drawer-overlay');
  const drawer   = document.getElementById('drawer');
  const body     = document.body;

  function ouvrirDrawer() {
    overlay.classList.add('open');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        drawer.classList.add('open');
      });
    });
    body.style.overflow = 'hidden';
  }

  function fermerDrawer() {
    drawer.classList.remove('open');
    overlay.classList.remove('open');
    body.style.overflow = '';
  }

  document.getElementById('btn-filtrer').addEventListener('click', ouvrirDrawer);
  document.getElementById('drawer-close').addEventListener('click', fermerDrawer);
  overlay.addEventListener('click', fermerDrawer);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') fermerDrawer(); });

  // ─── SWIPE TO CLOSE ──────────────────────────────────────
  let touchStartY = 0;
  drawer.addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  drawer.addEventListener('touchend', e => {
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (dy > 80) fermerDrawer();
  }, { passive: true });

  // ─── CHIPS ──────────────────────────────────────────────
  function bindChips() {
    document.querySelectorAll('.chip').forEach(chip => {
      chip.onclick = null;
      chip.addEventListener('click', () => {
        const filtre = chip.dataset.filtre;
        const valeur = chip.dataset.valeur;
        filtreActif[filtre] = valeur;
        document.querySelectorAll(`.chip[data-filtre="${filtre}"]`).forEach(c => {
          c.classList.toggle('actif', c.dataset.valeur === valeur);
        });
        majBadge();
      });
    });
  }

  // ─── BADGE ──────────────────────────────────────────────
  function majBadge() {
    const n = ['couleur','pays','cepage','statut','tri']
      .filter(k => filtreActif[k] !== 'tous' && filtreActif[k] !== 'defaut').length;
    const badge = document.getElementById('filtre-badge');
    const btn   = document.getElementById('btn-filtrer');
    if (n > 0) {
      badge.textContent = n;
      badge.classList.add('visible');
      btn.classList.add('has-filtres');
    } else {
      badge.classList.remove('visible');
      btn.classList.remove('has-filtres');
    }
  }

  // ─── FILTRES & TRI ──────────────────────────────────────
  function appliquerFiltres() {
    const terme = document.getElementById('recherche').value.toLowerCase().trim();
    const vins = Array.from(document.querySelectorAll('#cave .vin'));
    let visible = 0;

    vins.forEach(vin => {
      const ok =
        (filtreActif.couleur === 'tous' || vin.dataset.couleur === filtreActif.couleur) &&
        (filtreActif.pays    === 'tous' || (vin.dataset.pays||'').includes(filtreActif.pays)) &&
        (filtreActif.cepage  === 'tous' || (vin.dataset.cepage||'').toLowerCase().includes(filtreActif.cepage.toLowerCase())) &&
        (filtreActif.statut  === 'tous' || vin.dataset.statut === filtreActif.statut) &&
        (terme === '' || vin.textContent.toLowerCase().includes(terme));
      vin.classList.toggle('masque', !ok);
      if (ok) visible++;
    });

    const tries = vins.filter(v => !v.classList.contains('masque'));
    if (filtreActif.tri === 'alpha-asc') {
      tries.sort((a, b) => (a.querySelector('h2')?.textContent||'').localeCompare(b.querySelector('h2')?.textContent||'', 'fr'));
    } else if (filtreActif.tri === 'alpha-desc') {
      tries.sort((a, b) => (b.querySelector('h2')?.textContent||'').localeCompare(a.querySelector('h2')?.textContent||'', 'fr'));
    } else if (filtreActif.tri === 'pays') {
      tries.sort((a, b) => (a.dataset.pays||'').localeCompare(b.dataset.pays||'', 'fr'));
    } else if (filtreActif.tri === 'cepage') {
      tries.sort((a, b) => (a.dataset.cepage||'').localeCompare(b.dataset.cepage||'', 'fr'));
    } else {
      tries.sort((a, b) => ordreOriginal.indexOf(a) - ordreOriginal.indexOf(b));
    }
    tries.forEach(v => cave.appendChild(v));

    const total = vins.length;
    document.getElementById('compteur').textContent =
      visible === total
        ? `${total} bouteille${total > 1 ? 's' : ''}`
        : `${visible} / ${total} bouteille${total > 1 ? 's' : ''}`;

    document.getElementById('aucun-resultat').style.display = visible === 0 ? 'block' : 'none';
  }

  // ─── RESET ──────────────────────────────────────────────
  function resetFiltres() {
    filtreActif = { couleur: 'tous', pays: 'tous', cepage: 'tous', statut: 'tous', tri: 'defaut' };
    document.getElementById('recherche').value = '';
    document.querySelectorAll('.chip').forEach(c => {
      c.classList.toggle('actif', c.dataset.valeur === 'tous' || c.dataset.valeur === 'defaut');
    });
    majBadge();
    appliquerFiltres();
  }

  document.getElementById('btn-drawer-appliquer').addEventListener('click', () => {
    appliquerFiltres();
    fermerDrawer();
  });
  document.getElementById('btn-drawer-reset').addEventListener('click', resetFiltres);
  document.getElementById('recherche').addEventListener('input', appliquerFiltres);

  // ─── CÉPAGES DYNAMIQUES ─────────────────────────────────
  function genererChipsCepage() {
    const cepages = new Set();
    document.querySelectorAll('#cave .vin').forEach(vin => {
      const c = (vin.dataset.cepage || '').trim();
      if (c) c.split(' ').forEach(s => { if (s) cepages.add(s); });
    });
    const container = document.getElementById('chips-cepage');
    [...cepages].sort().forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.dataset.filtre = 'cepage';
      btn.dataset.valeur = c;
      btn.textContent = c;
      container.appendChild(btn);
    });
    bindChips();
  }

  // ─── BADGES STATUT & STOCK ──────────────────────────────
  function injecterBadges() {
    document.querySelectorAll('#cave .vin').forEach(vin => {
      const statut = vin.dataset.statut || 'cave';
      const stock  = vin.dataset.stock  || '1';
      const tagsDiv = vin.querySelector('.tags-vin');
      if (!tagsDiv) return;

      const tagStatut = document.createElement('span');
      tagStatut.className = statut === 'bu' ? 'tag tag-bu' : 'tag tag-cave';
      tagStatut.textContent = statut === 'bu' ? '✓ Bu' : '🏠 Cave';
      tagsDiv.appendChild(tagStatut);

      if (statut !== 'bu') {
        const badge = document.createElement('span');
        const n = parseInt(stock, 10) || 0;
        badge.className = 'badge-stock' + (n === 0 ? ' stock-zero' : '');
        badge.textContent = `🍾 ${n}`;
        tagsDiv.appendChild(badge);
      }
    });
  }

  // ─── PHOTOS MANQUANTES ──────────────────────────────────
  function gererPhotosManquantes() {
    document.querySelectorAll('.photo-bouteille').forEach(photo => {
      const remplacer = () => {
        const ph = document.createElement('div');
        ph.className = 'photo-a-ajouter';
        ph.textContent = 'Photo à ajouter';
        photo.replaceWith(ph);
      };
      photo.onerror = remplacer;
      if (photo.complete && photo.naturalWidth === 0) remplacer();
    });
  }

  // ─── GÉNÉRATION DES CARTES VIN ──────────────────────────
  function creerCarteVin(v) {
    const couleurTag = v.couleur === 'rouge' ? 'tag-rouge'
                     : v.couleur === 'blanc' ? 'tag-blanc'
                     : 'tag-rose';
    const couleurLabel = v.couleur === 'rouge' ? 'Rouge'
                       : v.couleur === 'blanc' ? 'Blanc'
                       : 'Rosé';

    // Premier mot du cépage pour le tag affiché
    const cepageTag = (v.cepage || '').split(' ')[0];

    // Lignes dégustation (on n'affiche que les champs non vides)
    const deg = v.degustation || {};
    let degLines = '';
    if (deg.couleur) degLines += `<p><strong>Couleur :</strong> ${deg.couleur}</p>`;
    if (deg.nez)     degLines += `<p><strong>Nez :</strong> ${deg.nez}</p>`;
    if (deg.bouche)  degLines += `<p><strong>Bouche :</strong> ${deg.bouche}</p>`;
    if (!degLines)   degLines = '<p>À compléter après dégustation.</p>';

    // Lignes techniques
    const t = v.technique || {};
    let techLines = '';
    if (t.vinification)  techLines += `<p><strong>Vinification :</strong> ${t.vinification}</p>`;
    if (t.classification || t.garde) {
      let line = '';
      if (t.classification) line += `<strong>Classification :</strong> ${t.classification}`;
      if (t.classification && t.garde) line += ' &nbsp;·&nbsp; ';
      if (t.garde) line += `<strong>Garde :</strong> ${t.garde}`;
      techLines += `<p>${line}</p>`;
    }
    if (t.carafage || t.temperature) {
      let line = '';
      if (t.carafage)    line += `<strong>Carafage :</strong> ${t.carafage}`;
      if (t.carafage && t.temperature) line += ' &nbsp;·&nbsp; ';
      if (t.temperature) line += `<strong>Température :</strong> ${t.temperature}`;
      techLines += `<p>${line}</p>`;
    }
    if (t.accords) techLines += `<p><strong>Accords :</strong> ${t.accords}</p>`;

    const id = v.identite || {};
    let identiteLines = '';
    if (id.region_detail || id.cepage_detail) {
      let line = '';
      if (id.region_detail) line += `<strong>Région :</strong> ${id.region_detail}`;
      if (id.region_detail && id.cepage_detail) line += ' &nbsp;·&nbsp; ';
      if (id.cepage_detail) line += `<strong>Cépage :</strong> ${id.cepage_detail}`;
      identiteLines += `<p>${line}</p>`;
    }
    if (id.style_detail) identiteLines += `<p><strong>Style :</strong> ${id.style_detail}</p>`;

    const div = document.createElement('div');
    div.className = 'vin';
    div.dataset.couleur = v.couleur || '';
    div.dataset.pays    = v.pays    || '';
    div.dataset.cepage  = v.cepage  || '';
    div.dataset.region  = v.region  || '';
    div.dataset.style   = v.style   || '';
    div.dataset.statut  = v.statut  || 'cave';
    div.dataset.stock   = v.stock   !== undefined ? v.stock : 1;

    div.innerHTML = `
      <div class="entete-vin">
        <div class="zone-photo">
          <img src="${v.photo || ''}" alt="${v.nom}" class="photo-bouteille">
        </div>
        <div class="infos-vin">
          <div class="tags-vin">
            <span class="tag ${couleurTag}">${couleurLabel}</span>
            <span class="tag tag-pays">${v.region || v.pays || ''}</span>
            <span class="tag tag-cepage">${cepageTag}</span>
          </div>
          <h2>${v.nom}</h2>
          ${identiteLines ? `<h3>Identité</h3>${identiteLines}` : ''}
          ${v.profil ? `<h3>Profil</h3><p>${v.profil}</p>` : ''}
          ${v.notes ? `<p><strong>Notes :</strong> ${v.notes}</p>` : ''}
        </div>
      </div>
      <details><summary>Dégustation</summary>${degLines}</details>
      ${techLines ? `<details><summary>Infos techniques</summary>${techLines}</details>` : ''}
    `;
    return div;
  }

  // ─── CHARGEMENT DU JSON ─────────────────────────────────
  async function chargerVins() {
    try {
      const resp = await fetch('vins.json');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const vins = await resp.json();

      vins.forEach(v => {
        const carte = creerCarteVin(v);
        cave.appendChild(carte);
      });

      ordreOriginal = Array.from(cave.querySelectorAll('.vin'));

      injecterBadges();
      genererChipsCepage();
      gererPhotosManquantes();
      appliquerFiltres();

    } catch (err) {
      cave.innerHTML = `
        <div style="padding:40px;text-align:center;color:#8b2020;font-family:'Cormorant Garamond',serif;font-size:1.1rem;">
          ⚠️ Impossible de charger <strong>vins.json</strong>.<br>
          <small style="font-size:0.85rem;color:#6b5050;">Vérifiez que le fichier est présent dans le même dossier que cette page.<br>${err.message}</small>
        </div>`;
    }
  }

  // ─── INIT ────────────────────────────────────────────────
  chargerVins();
</script>
</body>
</html>
