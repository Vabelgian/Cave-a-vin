<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Régions Viticoles</title>
  <style>
    :root {
      --bg: #0d1014;
      --card: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --text: #f4f4f4;
      --muted: #b5bcc8;
      --gold: #d4af37;
      --shadow: rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(212,175,55,0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(90,110,180,0.12), transparent 35%),
        linear-gradient(180deg, #0b0d10 0%, #151a20 100%);
      color: var(--text);
      overflow-x: hidden;
    }
    .top-nav {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(8,10,12,0.82);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-container {
      max-width: 1400px; margin: auto;
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 24px;
    }
    .nav-logo { text-decoration: none; color: white; font-weight: 700; font-size: 1.15rem; }
    .nav-links { display: flex; gap: 12px; flex-wrap: wrap; }
    .nav-links a {
      text-decoration: none; color: var(--muted);
      padding: 10px 14px; border-radius: 12px; transition: 0.2s ease;
    }
    .nav-links a:hover, .nav-links a.active {
      background: rgba(255,255,255,0.06); color: white;
    }
    .hero {
      max-width: 1200px; margin: auto;
      padding: 90px 24px 50px; text-align: center;
    }
    .hero h1 { margin: 0; font-size: 4rem; letter-spacing: -2px; }
    .hero h1 span { color: var(--gold); }
    .hero p {
      max-width: 850px; margin: 24px auto 0;
      color: var(--muted); line-height: 1.8; font-size: 1.1rem;
    }
    .container { max-width: 1400px; margin: auto; padding: 0 24px 80px; }
    .region-filter-zone {
      max-width: 760px;
      margin: 0 auto 35px;
      padding: 15px;
      background-color: #f9f6f0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 15px;
      color: #4a1525;
    }
    .region-filter-zone label {
      font-weight: bold;
      color: #4a1525;
      white-space: nowrap;
    }
    .region-dropdown {
      padding: 10px 15px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background-color: #fff;
      color: #151a20;
      cursor: pointer;
      flex-grow: 1;
      max-width: 300px;
    }
    .section-title { margin: 60px 0 24px; font-size: 2rem; letter-spacing: -1px; }
    .regions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 28px;
    }
    .region-card {
      position: relative; overflow: hidden; border-radius: 28px;
      min-height: 500px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 25px 50px rgba(0,0,0,0.35);
      transition: transform 0.25s ease;
    }
    .region-card:hover { transform: translateY(-6px); }
    .region-image {
      height: 230px; background-size: cover; background-position: center; position: relative;
    }
    .region-image::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(12,14,17,0.85) 100%);
    }
    .region-content { padding: 28px; }
    .region-country {
      color: var(--gold); font-size: 0.85rem;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    }
    .region-card h2 { margin: 0; font-size: 2rem; letter-spacing: -1px; }
    .region-subtitle { margin-top: 10px; color: var(--muted); line-height: 1.7; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 28px; }
    .info-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px; padding: 16px;
    }
    .info-box span {
      display: block; color: var(--gold); font-size: 0.78rem;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    }
    .info-box strong { font-size: 0.95rem; line-height: 1.5; }
    .focus-box {
      margin-top: 24px; background: rgba(255,255,255,0.04);
      border-left: 3px solid var(--gold); padding: 18px;
      border-radius: 0 18px 18px 0;
    }
    .focus-box h3 { margin-top: 0; margin-bottom: 12px; font-size: 1rem; }
    .focus-box p { margin: 0; color: var(--muted); line-height: 1.7; font-size: 0.95rem; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 24px; }
    .tag {
      padding: 8px 12px; border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 0.82rem; color: var(--muted);
    }
    .explore-btn {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 18px; margin-bottom: 8px; padding: 12px 20px; border-radius: 14px;
      background: rgba(212,175,55,0.1);
      border: 1px solid rgba(212,175,55,0.3);
      color: var(--gold); font-size: 0.9rem; font-weight: 600;
      text-decoration: none; transition: background 0.2s, border-color 0.2s; cursor: pointer;
      width: fit-content;
    }
    .explore-btn:hover { background: rgba(212,175,55,0.18); border-color: rgba(212,175,55,0.55); }
    .explore-btn svg { transition: transform 0.2s; }
    .explore-btn:hover svg { transform: translateX(4px); }
    .footer {
      margin-top: 80px; text-align: center;
      color: var(--muted); line-height: 1.8; font-size: 0.95rem;
    }
    .chargement { text-align: center; padding: 60px; color: var(--muted); font-size: 1.1rem; }
    @media (max-width: 768px) {
      .hero h1 { font-size: 2.8rem; }
      .info-grid { grid-template-columns: 1fr; }
      .nav-container { flex-direction: column; align-items: flex-start; gap: 14px; }
    }
    @media screen and (max-width: 600px) {
      .region-filter-zone {
        margin: 0 24px 32px;
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }
      .region-filter-zone label { white-space: normal; }
      .region-dropdown {
        max-width: 100%;
        padding: 12px;
      }
      .explore-btn {
        width: 100%;
        justify-content: center;
        min-height: 46px;
      }
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">🍷 Ma Cave</a>
      <div class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="Ma-Cave.html">Ma Cave</a>
        <a href="millesimes.html">Millésimes</a>
        <a href="regionsviticoles.html" class="active">Régions</a>
      </div>
    </div>
  </nav>

  <section class="hero">
    <h1>Régions <span>Viticoles</span></h1>
    <p>
      Explorer les terroirs, comprendre les styles de vins et découvrir les régions qui façonnent
      l'identité de la cave. Chaque région possède son climat, ses cépages et son énergie propre.
    </p>
  </section>

  <!-- Zone de navigation rapide par région -->
  <div class="region-filter-zone">
    <label for="region-selector">📍 Choisir une région :</label>
    <select id="region-selector" class="region-dropdown" onchange="scrollToRegion(this.value)">
      <option value="" disabled selected>-- Sélectionnez un pays --</option>
    </select>
  </div>

  <div class="container" id="contenu">
    <div class="chargement">Chargement des régions...</div>
  </div>

  <script>
    fetch('regions.json')
      .then(r => r.json())
      .then(regions => afficher(regions))
      .catch(() => {
        document.getElementById('contenu').innerHTML =
          '<div class="chargement">⚠️ Impossible de charger regions.json</div>';
      });

    function afficher(regions) {
      // Regrouper par pays en préservant l'ordre d'apparition
      const paysOrder = [];
      const parPays = {};
      regions.forEach(r => {
        if (!parPays[r.pays]) { parPays[r.pays] = []; paysOrder.push(r.pays); }
        parPays[r.pays].push(r);
      });

      const arrowSVG = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/></svg>`;

      const selector = document.getElementById('region-selector');
      const flags = {
        'France': '🇫🇷',
        'Italie': '🇮🇹',
        'Espagne': '🇪🇸',
        'Afrique du Sud': '🇿🇦'
      };
      selector.innerHTML = '<option value="" disabled selected>-- Sélectionnez un vignoble --</option>' +
        paysOrder.map(pays => `<option value="#${slugifyRegion(pays)}">${flags[pays] || '📍'} ${pays}</option>`).join('');

      let html = '';
      paysOrder.forEach(pays => {
        html += `<h2 class="section-title" id="${slugifyRegion(pays)}">${pays}</h2><div class="regions-grid">`;

        parPays[pays].forEach(r => {
          const infosHTML = Object.entries(r.infos).map(([k, v]) => `
            <div class="info-box"><span>${k}</span><strong>${v}</strong></div>`).join('');

          const tagsHTML = r.tags.map(t => `<div class="tag">${t}</div>`).join('');

          const focusHTML = r.focus ? `
            <div class="focus-box">
              <h3>Pourquoi cette région est spéciale</h3>
              <p>${r.focus}</p>
            </div>` : '';

          const lienLabel = r.lien_label || 'Explorer la région';
          const lienHTML = r.lien ? `
            <a href="${r.lien}" class="explore-btn">${lienLabel} ${arrowSVG}</a>` : '';

          html += `
            <div class="region-card">
              <div class="region-image" style="background-image:url('${r.image}');"></div>
              <div class="region-content">
                <div class="region-country">${r.pays}</div>
                <h2>${r.nom}</h2>
                <p class="region-subtitle">${r.subtitle}</p>
                ${lienHTML}
                <div class="info-grid">${infosHTML}</div>
                ${focusHTML}
                ${tagsHTML.length ? `<div class="tag-list">${tagsHTML}</div>` : ''}
              </div>
            </div>`;
        });

        html += '</div>';
      });

      html += `<div class="footer">
        Cette page évoluera avec la cave.
        Chaque nouvelle bouteille peut enrichir la compréhension d'une région, d'un terroir ou d'un style de vin.
      </div>`;

      document.getElementById('contenu').innerHTML = html;
    }

    function slugifyRegion(text) {
      return text
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    function scrollToRegion(anchorId) {
      if (anchorId) {
        const targetElement = document.querySelector(anchorId);
        if (targetElement) {
          targetElement.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      }
    }
  </script>

</body>
</html>
